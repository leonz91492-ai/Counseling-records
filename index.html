<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三民國小 輔導人員服務記錄儀表板</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Recharts 必須的依賴套件 -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  
  <!-- 引入 Babel (用於在瀏覽器內編譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Recharts 圖表庫 (指定穩定版本與路徑) -->
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
</head>
<body>
  <!-- React 應用的掛載點 -->
  <div id="root"></div>

  <!-- 應用程式邏輯 -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = window.Recharts;

    const COLORS = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6'];

    // --- 圖示組件 ---
    const Activity = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const UserCheck = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H5c-2.2 0-4 1.8-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>;
    const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const Users = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5c-2.2 0-4 1.8-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
    const User = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const Loader2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;

    // --- 資料清洗工具函數 ---
    const parseDurationToMinutes = (val) => {
      if (!val) return 0;
      const str = String(val).trim();
      
      if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(str)) {
        const parts = str.split(':');
        return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
      }

      if (str.includes('T')) {
        const timePart = str.split('T')[1].split('.')[0]; 
        const parts = timePart.split(':');
        let h = parseInt(parts[0] || 0, 10);
        let m = parseInt(parts[1] || 0, 10);
        
        if (str.includes('1899') && h >= 12) {
          h = (h + 8) % 24;
        }
        return h * 60 + m;
      }
      
      if (!isNaN(parseFloat(str))) {
        const num = parseFloat(str);
        if (num < 1) return Math.round(num * 24 * 60);
        return Math.round(num);
      }
      
      return 0;
    };

    const formatDate = (val) => {
      if (!val) return '';
      const str = String(val);
      if (str.includes('T')) {
         const d = new Date(str);
         if (!isNaN(d.getTime())) {
           return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
         }
      }
      return str.split(' ')[0];
    };

    const getFieldValue = (item, keywords, defaultVal = '') => {
      const key = Object.keys(item).find(k => keywords.some(kw => k.includes(kw)));
      return key ? item[key] : defaultVal;
    };

    // --- 主程式組件 ---
    function App() {
      const [rawData, setRawData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [error, setError] = useState(null);

      const fetchData = async () => {
        setIsRefreshing(true);
        try {
          const response = await fetch('https://script.google.com/macros/s/AKfycbwzRC0RExPP8dZd6rPOfsEVa5JdENBrSRvil48HSAb_yfFGMCgNt-Y_RTNqomzgujv_/exec');
          if (!response.ok) throw new Error('網路回應異常');
          const result = await response.json();
          
          const formattedData = result.map((item, index) => {
            const rawDuration = getFieldValue(item, ['時長', '輔導時間', 'duration'], '0:00:00');
            const rawDate = getFieldValue(item, ['服務日期', 'date', '日期'], '');

            return {
              id: item.id || index + 1,
              timestamp: getFieldValue(item, ['時間戳記', 'timestamp'], ''),
              counselor: getFieldValue(item, ['輔導人員', 'counselor'], ''),
              date: formatDate(rawDate),
              student: getFieldValue(item, ['學生', 'student'], ''),
              class: getFieldValue(item, ['班級', 'class'], ''),
              summary: getFieldValue(item, ['摘要', 'summary'], ''),
              durationMins: parseDurationToMinutes(rawDuration),
              type: getFieldValue(item, ['輔導類型', 'type'], ''),
              nextStep: getFieldValue(item, ['追蹤', 'nextStep', '建議'], '')
            };
          });
          
          setRawData(formattedData);
          setError(null);
        } catch (err) {
          console.error('Fetch error:', err);
          setError('無法載入資料，請確認網址是否正確，或檢查 Apps Script 權限是否設為「所有人」。');
        } finally {
          setIsLoading(false);
          setIsRefreshing(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, []);

      const lastUpdateTimestamp = useMemo(() => {
        if (rawData.length === 0) return '載入中...';
        const lastRecord = rawData[rawData.length - 1];
        let ts = lastRecord.timestamp;
        
        if (ts && String(ts).includes('T')) {
          const d = new Date(ts);
          if (!isNaN(d.getTime())) {
            return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
          }
        }
        return ts || '尚無時間紀錄';
      }, [rawData]);

      const totalSessions = rawData.length;
      const uniqueStudents = new Set(rawData.map(item => item.student)).size;
      
      const totalMinutes = useMemo(() => {
        return rawData.reduce((acc, curr) => acc + (curr.durationMins || 0), 0);
      }, [rawData]);

      // 計算各學年的服務次數
      const gradeStats = useMemo(() => {
        const stats = {};
        rawData.forEach(item => {
          const classStr = item.class != null ? String(item.class).trim() : '';
          
          if(classStr && classStr.length >= 3) {
            const grade = `${classStr.charAt(0)}年級`;
            stats[grade] = (stats[grade] || 0) + 1;
          } else if (classStr) {
            stats['其他'] = (stats['其他'] || 0) + 1;
          }
        });
        return Object.keys(stats).map(key => ({ name: key, '服務次數': stats[key] })).sort((a, b) => a.name.localeCompare(b.name));
      }, [rawData]);

      // 找出服務次數最高的學年數值 (用於長條圖橘色標記)
      const maxGradeCount = useMemo(() => {
        if (gradeStats.length === 0) return 0;
        return Math.max(...gradeStats.map(s => s['服務次數']));
      }, [gradeStats]);

      // 計算輔導類型分佈
      const typeStats = useMemo(() => {
        const stats = {};
        rawData.forEach(item => {
          if (item.type) {
            stats[item.type] = (stats[item.type] || 0) + 1;
          }
        });
        return Object.keys(stats).map(key => ({ name: key, value: stats[key] }));
      }, [rawData]);

      // 服務對象列表合併顯示班級
      const studentList = useMemo(() => {
        const stats = {};
        rawData.forEach(item => {
          if(item.student) {
            const classStr = item.class != null ? String(item.class).trim() : '';
            const className = classStr ? `(${classStr})` : '';
            const key = `${item.student} ${className}`;
            stats[key] = (stats[key] || 0) + 1;
          }
        });
        return Object.keys(stats).map(key => ({ name: key, count: stats[key] })).sort((a, b) => b.count - a.count);
      }, [rawData]);

      if (isLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center font-sans">
            <Loader2 className="w-12 h-12 text-blue-500 animate-spin mb-4" />
            <p className="text-slate-600 font-medium">正在與系統連線載入最新資料，請稍候...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center font-sans p-6">
            <div className="bg-white p-8 rounded-xl shadow-sm border border-red-200 text-center max-w-md">
              <p className="text-red-500 text-lg font-bold mb-3">連線發生錯誤</p>
              <p className="text-slate-600 mb-4">{error}</p>
              <button 
                onClick={fetchData}
                className="mb-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
              >
                重新嘗試連線
              </button>
              <p className="text-sm text-slate-500 text-left bg-slate-50 p-4 rounded-md">
                💡 建議檢查：<br/>
                1. 部署 Apps Script 時，「誰可以存取」是否已設定為<strong className="text-slate-700">「所有人 (Anyone)」</strong>。<br/>
                2. Google Sheet 內欄位名稱是否有更動。
              </p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 p-6 font-sans text-slate-800">
          <div className="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
            <div>
              <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-3">
                <Activity className="text-blue-600 h-8 w-8" />
                三民國小 輔導人員服務記錄儀表板
              </h1>
              <p className="text-slate-500 mt-2 flex items-center gap-2">
                <Clock className="w-4 h-4" /> 
                資料統計至：{lastUpdateTimestamp}
              </p>
            </div>
            
            {/* 重新整理按鈕 */}
            <button
              onClick={fetchData}
              disabled={isRefreshing}
              className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg shadow-sm hover:bg-slate-50 active:bg-slate-100 transition-all font-medium disabled:opacity-70"
            >
              <RefreshCw className={`w-5 h-5 ${isRefreshing ? 'animate-spin text-blue-500' : 'text-slate-500'}`} />
              {isRefreshing ? '更新中...' : '重新整理資料'}
            </button>
          </div>

          <div className="max-w-7xl mx-auto space-y-6">
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div className="p-4 bg-blue-50 text-blue-600 rounded-full shrink-0">
                  <Calendar className="w-8 h-8" />
                </div>
                <div className="flex-1">
                  <p className="text-sm text-slate-500 font-medium">總服務次數</p>
                  <p className="text-3xl font-bold text-slate-800">{totalSessions} <span className="text-base font-normal text-slate-500">次</span></p>
                </div>
              </div>
              
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div className="p-4 bg-emerald-50 text-emerald-600 rounded-full">
                  <UserCheck className="w-8 h-8" />
                </div>
                <div>
                  <p className="text-sm text-slate-500 font-medium">服務對象總數</p>
                  <p className="text-3xl font-bold text-slate-800">{uniqueStudents} <span className="text-base font-normal text-slate-500">人</span></p>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div className="p-4 bg-amber-50 text-amber-600 rounded-full">
                  <Clock className="w-8 h-8" />
                </div>
                <div>
                  <p className="text-sm text-slate-500 font-medium">累計服務時間</p>
                  <p className="text-3xl font-bold text-slate-800">{totalMinutes} <span className="text-base font-normal text-slate-500">分鐘</span></p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <Users className="w-5 h-5 text-emerald-500" /> 各學年輔導服務次數分佈
                </h3>
                <div className="h-72 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={gradeStats} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E2E8F0" />
                      <XAxis dataKey="name" axisLine={false} tickLine={false} />
                      <YAxis axisLine={false} tickLine={false} allowDecimals={false} />
                      <RechartsTooltip cursor={{ fill: '#F1F5F9' }} contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                      <Bar dataKey="服務次數" radius={[6, 6, 0, 0]} maxBarSize={60}>
                        {gradeStats.map((entry, index) => (
                          <Cell 
                            key={`cell-${index}`} 
                            // 判斷若為最高次數，則顯示橘色 (#F59E0B)，否則顯示原本的綠色 (#10B981)
                            fill={entry['服務次數'] === maxGradeCount && maxGradeCount > 0 ? '#F59E0B' : '#10B981'} 
                          />
                        ))}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <PieChart className="w-5 h-5 text-indigo-500" /> 
                  輔導類型分佈
                </h3>
                <div className="h-72 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie
                        data={typeStats}
                        cx="50%"
                        cy="50%"
                        innerRadius={60}
                        outerRadius={100}
                        paddingAngle={5}
                        dataKey="value"
                        label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}
                      >
                        {typeStats.map((entry, index) => (
                          <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                        ))}
                      </Pie>
                      <RechartsTooltip contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                      <Legend verticalAlign="bottom" height={36} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 col-span-1">
                <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">服務對象統計</h3>
                <ul className="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                  {studentList.map((student, idx) => (
                    <li key={idx} className="flex justify-between items-center p-3 bg-slate-50 rounded-lg">
                      <span className="font-medium text-slate-700">{student.name}</span>
                      <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold">
                        {student.count} 次
                      </span>
                    </li>
                  ))}
                </ul>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 col-span-1 lg:col-span-2 overflow-hidden flex flex-col">
                <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">詳細服務時間與摘要</h3>
                <div className="overflow-x-auto overflow-y-auto flex-1 max-h-[500px]">
                  <table className="w-full text-left border-collapse min-w-[600px]">
                    <thead className="sticky top-0 bg-white shadow-sm z-10">
                      <tr className="bg-slate-50 text-slate-500 text-sm">
                        <th className="p-3 font-medium rounded-tl-lg">日期</th>
                        <th className="p-3 font-medium">對象 (班級)</th>
                        <th className="p-3 font-medium">摘要</th>
                        <th className="p-3 font-medium">類型</th>
                        <th className="p-3 font-medium rounded-tr-lg">時長</th>
                      </tr>
                    </thead>
                    <tbody className="text-sm divide-y divide-slate-100">
                      {rawData.map(row => (
                        <tr key={row.id} className="hover:bg-slate-50 transition-colors">
                          <td className="p-3 text-slate-700 whitespace-nowrap">{row.date}</td>
                          <td className="p-3 font-medium text-slate-900 whitespace-nowrap">{row.student} <span className="text-slate-400 text-xs">({row.class})</span></td>
                          <td className="p-3 text-slate-600 truncate max-w-xs" title={row.summary}>{row.summary}</td>
                          <td className="p-3 whitespace-nowrap">
                            <span className="px-2 py-1 bg-slate-100 text-slate-600 rounded text-xs">{row.type}</span>
                          </td>
                          <td className="p-3 text-slate-700 font-mono whitespace-nowrap">{row.durationMins} 分</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // 將 App 渲染到頁面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
